version: '3.8'

services:
  agent:
    build: .
    env_file: .env.example
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    expose:
      - "8000"
      
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
      
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
